on:
   push:
    branches:
      -master
   pull_request:
   jobs:
     build:
      runs-on: ubuntu-latest
      steps:
       - name: Checkout
         uses: actions/checkout@v3

       - name: Setup python
         uses: actions/setup-python@v4
         with:
             python-version: '3.11'

       - name: Install dependencies
         run: pip install -r requirements.txt

       - name: Run tests
         run: pytest
